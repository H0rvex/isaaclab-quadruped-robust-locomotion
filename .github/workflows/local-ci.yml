name: Local CI

on:
  push:
  pull_request:

jobs:
  local-validation:
    name: Local-only validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check source scripts tests

      - name: Ruff format check
        run: python -m ruff format --check source scripts tests

      - name: Pytest local suite
        run: python -m pytest tests -q

      - name: Run local interface demo
        run: python scripts/demo_local_interface.py --json-out results/demo/local_interface_demo.json

      - name: Upload local interface demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-interface-demo
          path: results/demo/local_interface_demo.json
          if-no-files-found: error
