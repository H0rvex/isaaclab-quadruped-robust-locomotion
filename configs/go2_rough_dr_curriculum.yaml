experiment:
  name: go2_rough_dr_curriculum
  description: Rough-terrain Go2 training with terrain and domain-randomization curriculum.
  stage: M6

runtime:
  isaac_lab: "2.3.2"
  isaac_sim: "5.1.0"
  python: "3.11"
  pytorch: "2.7.0+cu128"
  backend: rsl_rl

task:
  robot: Unitree Go2
  task_id: Isaac-Velocity-Rough-Unitree-Go2-v0
  fallback_task_id: Isaac-Velocity-Rough-Anymal-D-v0
  terrain: rough

training:
  seed: 1
  num_envs: 4096
  max_iterations: 3500
  headless: true

terrain_curriculum:
  enabled: true
  start_level: 0
  final_level: 5
  advance_metric: mean_episode_return
  advance_threshold: 0.75

domain_randomization:
  curriculum_enabled: true
  start_level: none
  final_level: moderate
  friction_range_start: [0.9, 1.1]
  friction_range_final: [0.6, 1.4]
  actuator_strength_scale_start: [0.95, 1.05]
  actuator_strength_scale_final: [0.85, 1.15]
  push_velocity_range_start: [0.0, 0.1]
  push_velocity_range_final: [0.0, 0.5]

evaluation:
  seed: 1000
  episodes: 20
  record_video: true

artifacts:
  results_dir: results
  run_name: go2_rough_dr_curriculum_seed_001
