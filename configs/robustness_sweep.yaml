experiment:
  name: robustness_sweep
  description: Controlled perturbation sweep for trained quadruped policies.
  stage: M7

evaluation:
  seeds: [1000, 1001, 1002]
  episodes_per_condition: 10
  policies:
    - go2_flat_baseline
    - go2_rough_baseline
    - go2_rough_dr
    - go2_rough_dr_curriculum

sweep_axes:
  terrain_level: [0, 1, 2, 3, 4, 5]
  friction: [0.5, 0.7, 1.0, 1.3, 1.6]
  payload_kg: [0.0, 1.0, 2.0, 3.0]
  actuator_strength_scale: [0.7, 0.85, 1.0, 1.15]
  push_velocity_mps: [0.0, 0.25, 0.5, 0.75, 1.0]

metrics:
  - mean_return
  - std_return
  - mean_episode_length
  - fall_rate
  - recovery_rate

artifacts:
  eval_dir: results/eval
  table_dir: results/tables
  video_dir: results/videos
